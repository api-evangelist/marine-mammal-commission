aid: marine-mammal-commission
name: Marine Mammal Commission
description: >-
  The Marine Mammal Commission is an independent agency of the U.S. federal
  government established by the Marine Mammal Protection Act of 1972. The
  Commission provides science-based oversight of federal agency actions and
  domestic and international policies affecting the conservation of marine
  mammals and their ecosystems.
